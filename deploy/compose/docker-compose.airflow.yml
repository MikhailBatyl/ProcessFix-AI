version: "3.9"

# Airflow использует CeleryExecutor с уже имеющимся Redis как брокером.
# Metadata DB — отдельная database `airflow` в общем postgres контейнере,
# чтобы не плодить лишние контейнеры в dev-окружении (для prod — отдельный PG).

x-airflow-common: &airflow-common
  build:
    context: ../../
    dockerfile: deploy/dockerfiles/Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW_TZ:-Asia/Novosibirsk}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER:-processfix}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/1
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-processfix}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    # App env passthrough
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_USER: ${POSTGRES_USER:-processfix}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    POSTGRES_DB: ${POSTGRES_DB:-processfix}
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: "8123"
    CLICKHOUSE_DB: ${CLICKHOUSE_DB:-processfix}
    CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    REDIS_URL: redis://redis:6379/0
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ANALYTICS_SOURCE: ${ANALYTICS_SOURCE:-raw}
  volumes:
    - ../../airflow/dags:/opt/airflow/dags
    - ../../notebooks:/opt/airflow/notebooks
    - ../../dbt:/opt/airflow/dbt
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  airflow-init:
    <<: *airflow-common
    container_name: processfix-airflow-init
    entrypoint: >
      /bin/bash -c "
      airflow db check || (
        echo 'Creating airflow database...' &&
        PGPASSWORD=$${POSTGRES_PASSWORD} psql -h postgres -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'CREATE DATABASE airflow;' 2>/dev/null || true
      );
      airflow db migrate;
      airflow users create --role Admin --username admin --password admin --email admin@processfix.local --firstname Admin --lastname User || true;
      echo 'Airflow init complete.';
      "
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: processfix-airflow-webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: processfix-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: processfix-airflow-worker
    command: celery worker
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_logs:

networks:
  default:
    name: processfix-net
    external: true
